<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贷款利率计算器 - 支持提前还款</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-xs {
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 4px;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 16px;
            font-size: 16px;
            background: transparent;
        }

        .input-suffix {
            padding: 0 12px;
            color: #666;
            font-size: 14px;
            background: #f5f5f5;
        }

        .date-input {
            display: flex;
            align-items: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0 8px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .date-input:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .date-input input {
            border: none;
            outline: none;
            padding: 12px 8px;
            font-size: 16px;
            background: transparent;
            text-align: center;
        }

        .section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .badge {
            padding: 2px 8px;
            background: #667eea;
            color: white;
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
        }

        .row.compact {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .row.compact input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .row.compact input:focus {
            border-color: #667eea;
        }

        .record-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 14px;
        }

        .record-item .amount {
            font-weight: 600;
            color: #333;
        }

        .record-item.rate-item {
            background: #e3f2fd;
        }

        .date-picker-group {
            display: flex;
            align-items: center;
            gap: 5px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 2px;
            flex: 1;
        }

        .date-picker-group input {
            border: none;
            outline: none;
            padding: 8px 6px;
            font-size: 14px;
            background: transparent;
            text-align: center;
        }

        .date-picker-group input:focus {
            background: #f0f0f0;
            border-radius: 4px;
        }

        .period-badge {
            background: #667eea;
            color: white;
            padding: 8px 6px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
        }

        .history-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .history-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .history-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .history-card .card-header .title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .history-card .card-header .time {
            font-size: 12px;
            color: #999;
        }

        .history-card .card-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-card .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .history-card .info-row:last-child {
            border-bottom: none;
        }

        .history-card .info-row .label {
            font-size: 13px;
            color: #666;
        }

        .history-card .info-row .value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .history-card .info-row .value.highlight {
            color: #667eea;
        }

        .history-card .info-row .value.saved {
            color: #10b981;
        }

        .history-card .record-list {
            margin-top: 5px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-card .record-item {
            font-size: 12px;
            padding: 4px 0;
            color: #555;
        }

        .preset-plans {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .preset-btn {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .preset-btn:hover .preset-title,
        .preset-btn:hover .preset-desc {
            color: white;
        }

        .preset-title {
            font-weight: 600;
            font-size: 15px;
            color: #333;
            margin-bottom: 4px;
        }

        .preset-desc {
            font-size: 12px;
            color: #666;
        }

        .history-card .card-footer {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .main-btn {
            margin-top: 24px;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
        }

        .chart-wrapper {
            margin-bottom: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .chart-container {
            overflow: auto;
            cursor: grab;
        }

        .chart-container:active {
            cursor: grabbing;
        }

        .prepayment-list {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .prepayment-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 10px;
            gap: 15px;
        }

        .prepayment-item .info {
            flex: 1;
        }

        .prepayment-item .info div {
            margin-bottom: 5px;
        }

        .prepayment-item .label {
            font-weight: 600;
            color: #666;
        }

        .prepayment-item .value {
            color: #333;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
            font-size: 14px;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #fafafa;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar .principal {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            float: left;
        }

        .progress-bar .interest {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            height: 100%;
            float: left;
        }

        .highlight {
            background: #fff3cd !important;
        }

        .highlight-rate {
            background: #e3f2fd !important;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .tab {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .chart-container {
            height: 400px;
            position: relative;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            height: 300px;
            padding: 20px;
            gap: 2px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #10b981, #34d399);
            border-radius: 4px 4px 0 0;
            position: relative;
            min-height: 2px;
        }

        .chart-bar.interest {
            background: linear-gradient(180deg, #f59e0b, #fbbf24);
        }

        .chart-bar-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            align-items: center;
            gap: 2px;
        }

        .chart-x-axis {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 12px;
            color: #666;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 12px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .row {
                flex-direction: column;
            }

            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn {
                width: 100%;
            }

            .preset-plans {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .preset-plans {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>贷款利率计算器</h1>
            <p>支持提前还款和利率调整 · 自动计算最优还款方案</p>
        </div>

        <div class="card">
            <div class="section-header" style="margin-bottom: 15px;">
                <h3>📋 预设还款计划</h3>
            </div>
            <div class="preset-plans">
                <button class="preset-btn" onclick="applyPreset('plan1')">
                    <div class="preset-title">方案一：50万 · 15年</div>
                    <div class="preset-desc">利率4.9% · 2次提前还款</div>
                </button>
                <button class="preset-btn" onclick="applyPreset('plan2')">
                    <div class="preset-title">方案二：50万 · 20年</div>
                    <div class="preset-desc">利率4.9% · 2次提前还款</div>
                </button>
                <button class="preset-btn" onclick="applyPreset('plan3')">
                    <div class="preset-title">方案三：80万 · 15年</div>
                    <div class="preset-desc">利率4.9% · 3次提前还款</div>
                </button>
                <button class="preset-btn" onclick="applyPreset('plan4')">
                    <div class="preset-title">方案四：80万 · 20年</div>
                    <div class="preset-desc">利率4.9% · 3次提前还款</div>
                </button>
                <button class="preset-btn" onclick="applyPreset('plan5')">
                    <div class="preset-title">方案五：100万 · 15年</div>
                    <div class="preset-desc">利率4.9% · 3次提前还款</div>
                </button>
                <button class="preset-btn" onclick="applyPreset('plan6')">
                    <div class="preset-title">方案六：100万 · 20年</div>
                    <div class="preset-desc">利率4.9% · 3次提前还款</div>
                </button>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <div class="col" style="flex: 1.2;">
                    <div class="form-group">
                        <label>贷款金额</label>
                        <div class="input-group">
                            <input type="number" id="loanAmount" value="55" step="0.1" placeholder="金额">
                            <span class="input-suffix">万元</span>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>年利率</label>
                        <div class="input-group">
                            <input type="number" id="annualRate" value="5.341" step="0.001" placeholder="利率">
                            <span class="input-suffix">%</span>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>贷款期限</label>
                        <div class="input-group">
                            <input type="number" id="loanMonths" value="360" step="1" placeholder="月数">
                            <span class="input-suffix">个月</span>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>开始时间</label>
                        <div class="date-input">
                            <input type="number" id="startYear" value="2018" step="1" placeholder="年" style="width: 45%;">
                            <span style="margin: 0 4px;">/</span>
                            <input type="number" id="startMonth" value="1" step="1" min="1" max="12" placeholder="月" style="width: 45%;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h3>提前还款</h3>
                    <span class="badge" id="prepaymentCount">2条</span>
                </div>
                <div class="row compact">
                    <div class="date-picker-group">
                        <input type="number" id="prepayYear" value="2023" step="1" placeholder="年" style="width: 35%;">
                        <input type="number" id="prepayMonth" value="10" step="1" min="1" max="12" placeholder="月" style="width: 35%;">
                        <span id="prepayPeriod" class="period-badge" style="width: 25%; text-align: center;">第70期</span>
                    </div>
                    <input type="number" id="prepayAmount" value="15" step="0.1" placeholder="金额（万元）" style="flex: 0.8;">
                    <button class="btn btn-primary btn-sm" onclick="addPrepayment()">添加</button>
                </div>
                <div class="record-list" id="prepaymentList">
                    <div class="record-item">
                        <span>第70期 (2023年10月)</span>
                        <span class="amount">15.00万元</span>
                        <button class="btn btn-danger btn-xs" onclick="removePrepayment(this)">×</button>
                    </div>
                    <div class="record-item">
                        <span>第100期 (2026年4月)</span>
                        <span class="amount">15.00万元</span>
                        <button class="btn btn-danger btn-xs" onclick="removePrepayment(this)">×</button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h3>利率调整</h3>
                    <span class="badge" id="rateChangeCount">1条</span>
                </div>
                <div class="row compact">
                    <div class="date-picker-group">
                        <input type="number" id="rateYear" value="2023" step="1" placeholder="年" style="width: 35%;">
                        <input type="number" id="rateMonth" value="10" step="1" min="1" max="12" placeholder="月" style="width: 35%;">
                        <span id="ratePeriod" class="period-badge" style="width: 25%; text-align: center;">第70期</span>
                    </div>
                    <input type="number" id="rateValue" value="3.2" step="0.001" placeholder="新利率（%）" style="flex: 0.8;">
                    <button class="btn btn-primary btn-sm" onclick="addRateChange()">添加</button>
                </div>
                <div class="record-list" id="rateChangeList">
                    <div class="record-item rate-item">
                        <span>第70期 (2023年10月)</span>
                        <span class="amount">3.200%</span>
                        <button class="btn btn-danger btn-xs" onclick="removeRateChange(this)">×</button>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary main-btn" onclick="calculate()">计算还款明细</button>
        </div>

        <div class="card" id="resultCard" style="display: none;">
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="label">原计划总利息</div>
                    <div class="value" id="originalInterest">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">实际总利息</div>
                    <div class="value" id="actualInterest">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">节省利息</div>
                    <div class="value" id="savedInterest">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">实际还款期数</div>
                    <div class="value" id="actualMonths">-</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="showTab('table')">还款明细表</button>
                <button class="tab" onclick="showTab('echarts')">图表分析</button>
                <button class="tab" onclick="showTab('history')">计算历史</button>
            </div>

            <div id="tableContent">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>期数</th>
                                <th>还款日期</th>
                                <th>年利率（%）</th>
                                <th>月供（元）</th>
                                <th>本金（元）</th>
                                <th>利息（元）</th>
                                <th>剩余本金（元）</th>
                                <th>本金/利息占比</th>
                            </tr>
                        </thead>
                        <tbody id="repaymentTable">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="echartsContent" style="display: none;">
                <div class="chart-wrapper">
                    <div class="chart-container">
                        <div id="mainChart" style="width: 100%; height: 400px;"></div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-container">
                        <div id="stackedChart" style="width: 100%; height: 400px;"></div>
                    </div>
                </div>
            </div>

            <div id="historyContent" style="display: none;">
                <div id="historyCards" class="history-cards">
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button class="btn btn-danger btn-sm" onclick="clearHistory()">清空历史记录</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const prepayments = [
            { month: 70, amount: 15 },
            { month: 100, amount: 15 }
        ];

        const rateChanges = [
            { month: 70, rate: 3.2 }
        ];

        function calculatePeriod(year, month) {
            const startYear = parseInt(document.getElementById('startYear').value) || 2018;
            const startMonth = parseInt(document.getElementById('startMonth').value) || 1;

                months += 12;

            return years * 12 + months + 1;
        }

        function calculate() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value) * 10000;
            const annualRate = parseFloat(document.getElementById('annualRate').value) / 100;
            const loanMonths = parseInt(document.getElementById('loanMonths').value);
            const startYear = parseInt(document.getElementById('startYear').value);
            const startMonth = parseInt(document.getElementById('startMonth').value);

            if (!loanAmount || !annualRate || !loanMonths || loanAmount <= 0 || annualRate <= 0 || loanMonths <= 0) {
                alert('请输入有效的贷款信息');
                return;
            }
            if (!startYear || !startMonth || startMonth < 1 || startMonth > 12) {
                alert('请输入有效的贷款开始时间');
                return;
            }

            const monthlyRate = annualRate / 12;
            const originalInterest = calculateOriginalInterest(loanAmount, monthlyRate, loanMonths);
            
            const schedule = generateRepaymentSchedule(loanAmount, annualRate, loanMonths, prepayments, rateChanges, startYear, startMonth);
            window.currentSchedule = schedule;
            
            const actualInterest = schedule.reduce((sum, item) => sum + item.interest, 0);
            const savedInterest = originalInterest - actualInterest;

            document.getElementById('originalInterest').textContent = formatMoney(originalInterest);
            document.getElementById('actualInterest').textContent = formatMoney(actualInterest);
            document.getElementById('savedInterest').textContent = formatMoney(savedInterest);
            document.getElementById('actualMonths').textContent = schedule.length + '期';

            renderTable(schedule);
            
            addToHistory({
                loanAmount: loanAmount / 10000,
                annualRate: annualRate * 100,
                loanMonths: loanMonths,
                startYear: startYear,
                startMonth: startMonth,
                prepayments: JSON.parse(JSON.stringify(prepayments)),
                rateChanges: JSON.parse(JSON.stringify(rateChanges)),
                originalInterest: originalInterest,
                actualInterest: actualInterest,
                savedInterest: savedInterest,
                actualMonths: schedule.length
            });
            
            document.getElementById('resultCard').style.display = 'block';
            showTab('table');
        }

        function calculateOriginalInterest(principal, monthlyRate, months) {
            const monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
            return monthlyPayment * months - principal;
        }

        function generateRepaymentSchedule(principal, annualRate, months, prepayments, rateChanges, startYear, startMonth) {
            const schedule = [];
            let remainingPrincipal = principal;
            let currentMonth = 1;
            let currentMonthlyRate = annualRate / 12;
            let currentYear = startYear;
            let currentMonthOfYear = startMonth;
            
            const prepaySorted = [...prepayments].sort((a, b) => a.month - b.month);
            let prepayIndex = 0;
            
            const rateSorted = [...rateChanges].sort((a, b) => a.month - b.month);
            let rateIndex = 0;

            while (remainingPrincipal > 0 && currentMonth <= months) {
                if (rateIndex < rateSorted.length && currentMonth === rateSorted[rateIndex].month) {
                    currentMonthlyRate = rateSorted[rateIndex].rate / 100 / 12;
                    rateIndex++;
                }

                const remainingMonths = months - currentMonth + 1;
                const monthlyPayment = remainingPrincipal * currentMonthlyRate * Math.pow(1 + currentMonthlyRate, remainingMonths) / 
                                      (Math.pow(1 + currentMonthlyRate, remainingMonths) - 1);

                const interest = remainingPrincipal * currentMonthlyRate;
                const principalPart = monthlyPayment - interest;
                remainingPrincipal = Math.max(0, remainingPrincipal - principalPart);

                const isPrepayment = prepayIndex < prepaySorted.length && currentMonth === prepaySorted[prepayIndex].month;
                if (isPrepayment) {
                    remainingPrincipal -= prepaySorted[prepayIndex].amount * 10000;
                    prepayIndex++;
                }

                const isRateChange = rateIndex > 0 && rateSorted[rateIndex - 1] && currentMonth === rateSorted[rateIndex - 1].month;

                const dateStr = `${currentYear}年${currentMonthOfYear}月`;

                schedule.push({
                    month: currentMonth,
                    date: dateStr,
                    year: currentYear,
                    monthOfYear: currentMonthOfYear,
                    payment: monthlyPayment,
                    principal: principalPart,
                    interest: interest,
                    remaining: remainingPrincipal,
                    isPrepayment: isPrepayment,
                    isRateChange: isRateChange,
                    currentRate: currentMonthlyRate * 100 * 12
                });

                currentMonthOfYear++;
                if (currentMonthOfYear > 12) {
                    currentMonthOfYear = 1;
                    currentYear++;
                }
                currentMonth++;
            }

            return schedule;
        }

        function renderTable(schedule) {
            const tbody = document.getElementById('repaymentTable');
            tbody.innerHTML = schedule.map(item => {
                const principalPercent = item.payment > 0 ? (item.principal / item.payment * 100) : 0;
                const interestPercent = 100 - principalPercent;
                let highlightClass = '';
                let tagText = '';
                if (item.isPrepayment && item.isRateChange) {
                    highlightClass = 'highlight';
                    tagText = ' <strong>(提前还款+利率调整)</strong>';
                } else if (item.isPrepayment) {
                    highlightClass = 'highlight';
                    tagText = ' <strong>(提前还款)</strong>';
                } else if (item.isRateChange) {
                    highlightClass = 'highlight-rate';
                    tagText = ' <strong>(利率调整)</strong>';
                }
                return `
                    <tr class="${highlightClass}">
                        <td>${item.month}${tagText}</td>
                        <td>${item.date}</td>
                        <td>${item.currentRate.toFixed(4)}</td>
                        <td>${item.payment.toFixed(2)}</td>
                        <td>${item.principal.toFixed(2)}</td>
                        <td>${item.interest.toFixed(2)}</td>
                        <td>${item.remaining.toFixed(2)}</td>
                        <td>
                            <div>本金 ${principalPercent.toFixed(1)}% / 利息 ${interestPercent.toFixed(1)}%</div>
                            <div class="progress-bar">
                                <div class="principal" style="width: ${principalPercent}%"></div>
                                <div class="interest" style="width: ${interestPercent}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderChart(schedule) {
            const chartBars = document.getElementById('chartBars');
            
            const maxPayment = Math.max(...schedule.map(item => item.payment));
            const displayCount = Math.min(schedule.length, 200);
            const step = Math.floor(schedule.length / displayCount);
            
            let html = '';
            for (let i = 0; i < schedule.length; i += step) {
                const item = schedule[i];
                const principalHeight = (item.principal / maxPayment) * 100;
                const interestHeight = (item.interest / maxPayment) * 100;
                
                html += `
                    <div class="chart-bar-group">
                        <div class="chart-bar" style="height: ${principalHeight}%"></div>
                        <div class="chart-bar interest" style="height: ${interestHeight}%"></div>
                    </div>
                `;
            }
            chartBars.innerHTML = html;
        }

                                back: '重置缩放'
                            }
                        },
                        restore: {
                            title: '还原'
                        }
                    },
                    top: 10,
                    right: 10
                },
                series: [
                    {
                        name: '累计本金',
                        type: 'bar',
                        stack: 'total',
                        data: displayData.map((_, index) => {
                            return displayData.slice(0, index + 1).reduce((sum, item) => sum + item.principal, 0) / 10000;
                        }),
                        itemStyle: {
                            color: '#10b981'
                        }
                    },
                    {
                        name: '累计利息',
                        type: 'bar',
                        stack: 'total',
                        data: displayData.map((_, index) => {
                            return displayData.slice(0, index + 1).reduce((sum, item) => sum + item.interest, 0) / 10000;
                        }),
                        itemStyle: {
                            color: '#f59e0b'
                        }
                    }
                ]
            };
            stackedChart.setOption(stackedOption);

            window.addEventListener('resize', function() {
                mainChart.resize();
                stackedChart.resize();
            });
        }

        function formatMoney(value) {
            return '¥' + value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
    </script>
</body>
</html>
